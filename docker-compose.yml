services:
  mock-api:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - .:/app
    command: node mock-server.mjs
    ports:
      - "${MOCK_PORT:-4000}:4000"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:4000}
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    depends_on:
      - mock-api
    restart: unless-stopped
